<details>

  <p>මෙහි ඇති සුවිශේෂීම තාක්ෂණික අංගය වන්නේ ගැඹුරු ලෙස කරුණු විශ්ලේෂණය කිරීම සඳහා හඳුන්වා දී ඇති <mark>'max' reasoning effort</mark> සහ සංකීර්ණ කාර්යයන් වේගවත් කිරීම සඳහා උප-නියෝජිතයන් (subagents) භාවිත කරන <mark>'ultra' mode</mark> විශේෂාංගයයි.</p>

    <button id="sendBtn" onclick="sendPost()">Send to Bot</button>
    <p id="status"></p>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        async function sendPost() {
            const text = document.getElementById("postText").value;
            const status = document.getElementById("status");
            const btn = document.getElementById("sendBtn");

            if (!text) {
                status.innerText = "Text එක හිස්ව තියන්න බැහැ!";
                status.style.color = "red";
                return;
            }

            const userId = tg.initDataUnsafe?.user?.id;

            if (!userId) {
                status.innerText = "User ID එක හමුවුණේ නැහැ. Telegram Web App එකක් විදියට Open කරන්න.";
                status.style.color = "red";
                return;
            }

            btn.disabled = true;
            btn.innerText = "Sending Rich Message...";
            status.innerText = "";

            // ⚠️ OYAGE CLOUDFLARE WORKER URL EKA METHANATA DANNA
            const workerUrl = "https://your-worker-name.workers.dev"; 

            try {
                const response = await fetch(workerUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        action: "send_preview",
                        text: text,
                        chat_id: userId
                    })
                });

                const result = await response.json();

                if (result.success) {
                    status.innerText = "✅ සාර්ථකයි! Bot ගේ Chat එක බලන්න.";
                    status.style.color = "green";
                } else {
                    status.innerText = "❌ Error: " + (result.error || "Unknown error");
                    status.style.color = "red";
                }
            } catch (error) {
                status.innerText = "❌ Network Error! Worker URL එක හරිද බලන්න.";
                status.style.color = "red";
            }

            btn.disabled = false;
            btn.innerText = "Send to Bot";
        }
    </script>
