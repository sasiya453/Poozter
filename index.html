function addNewPack() {
    const raw = document.getElementById('packInput').value.trim();
    if (!raw) { showToast('⚠️ Enter a pack name or link'); return; }

    // Extract name from full URL if pasted
    let packName = raw;
    try {
        if (raw.includes('t.me') || raw.includes('telegram.me')) {
            const parts = raw.split('/').filter(Boolean);
            packName = parts[parts.length - 1];
        }
    } catch {}
    packName = packName.trim();

    if (!packName || packName.length < 2) { 
        showToast('⚠️ Invalid pack name'); 
        return; 
    }

    document.getElementById('welcomeText').style.display = 'none';

    if (savedPacks.includes(packName)) {
        showToast('ℹ️ Pack already added');
        closeModal('addPackModal');
        // Scroll to it
        document.getElementById(`section-${packName}`)
            ?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        setActiveTab(packName);
        return;
    }

    savedPacks.push(packName);
    localStorage.setItem('tg_saved_packs', JSON.stringify(savedPacks));
    renderTabs();
    closeModal('addPackModal');
    loadPackData(packName);
    showToast(`📦 Loading "${packName}"…`);
}

function removePack(packName) {
    showConfirm(
        'Remove Pack?',
        `Remove "${packName}" from your collection?`,
        '🗑️'
    ).then(agreed => {
        if (agreed) executeRemovePack(packName);
    });
}

function executeRemovePack(packName) {
    savedPacks = savedPacks.filter(p => p !== packName);
    localStorage.setItem('tg_saved_packs', JSON.stringify(savedPacks));
    loadedPackData.delete(packName);
    failedPacks.delete(packName);
    document.getElementById(`section-${packName}`)?.remove();
    renderTabs();
    showToast(`✅ Pack "${packName}" removed`);

    if (savedPacks.length === 0 && recentEmojis.length === 0) {
        document.getElementById('welcomeText').style.display = 'block';
    } else if (savedPacks.length > 0) {
        setActiveTab(savedPacks[0]);
    }
}

function clearAllData() {
    showConfirm(
        'Clear Everything?',
        'Remove all packs and recent emojis? This cannot be undone.',
        '⚠️'
    ).then(agreed => {
        if (agreed) executeClearData();
    });
}

function executeClearData() {
    savedPacks = [];
    recentEmojis = [];
    loadedPackData.clear();
    failedPacks.clear();
    localStorage.setItem('tg_saved_packs', '[]');
    localStorage.removeItem('tg_recent_emojis');
    renderTabs();

    const body = document.getElementById('pickerBody');
    body.innerHTML = `
        <div id="welcomeText" class="status-text">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" 
                 stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                <line x1="9" y1="9" x2="9.01" y2="9"/>
                <line x1="15" y1="9" x2="15.01" y2="9"/>
            </svg>
            No packs added yet.<br>
            Tap <strong>Add Pack</strong> to get started.
        </div>`;
    showToast('🗑️ All data cleared');
}

// ==========================================
// Recent Emojis
// ==========================================
function addToRecent(emojiData) {
    if (!emojiData.id) return; // Skip if no ID
    recentEmojis = recentEmojis.filter(e => e.id !== emojiData.id);
    recentEmojis.unshift(emojiData);
    if (recentEmojis.length > 32) recentEmojis.pop();
    try {
        localStorage.setItem('tg_recent_emojis', JSON.stringify(recentEmojis));
    } catch {}
    // Update recent grid if visible
    const grid = document.getElementById('grid-recent');
    if (grid) renderRecentGrid(grid);
}

function renderRecentGrid(grid) {
    grid.innerHTML = '';
    if (recentEmojis.length === 0) {
        grid.innerHTML = `<span style="color:var(--text-3);font-size:12px;
            grid-column:span 8;padding:8px 0">No recent emojis yet.</span>`;
        return;
    }
    const frag = document.createDocumentFragment();
    recentEmojis.forEach(item => {
        frag.appendChild(createEmojiEl(item));
    });
    grid.appendChild(frag);
}

// ==========================================
// Tab Management
// ==========================================
function setActiveTab(id) {
    document.querySelectorAll('.pack-tab').forEach(t => 
        t.classList.remove('active'));
    const tab = document.getElementById(`tab-${id}`);
    if (tab) {
        tab.classList.add('active');
        // Scroll tab into view
        tab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }
}

function renderTabs() {
    const container = document.getElementById('pickerTabs');
    container.innerHTML = '';

    // Recent tab
    const recentTab = document.createElement('div');
    recentTab.className = 'pack-tab recent-tab';
    recentTab.id = 'tab-recent';
    recentTab.title = 'Recently Used';
    recentTab.textContent = '🕒';
    recentTab.onclick = () => loadRecentEmojis();
    container.appendChild(recentTab);

    // Pack tabs
    savedPacks.forEach(packName => {
        const tab = document.createElement('div');
        tab.className = 'pack-tab';
        tab.id = `tab-${packName}`;
        tab.title = packName;

        // Try to use first emoji image as tab icon
        const packData = loadedPackData.get(packName);
        if (packData && packData.length > 0) {
            const img = document.createElement('img');
            img.src = `/api/image?file_id=${packData[0].file_id}`;
            img.alt = packName.substring(0,2).toUpperCase();
            img.onerror = () => { img.remove(); tab.textContent = packName.substring(0,2).toUpperCase(); };
            tab.appendChild(img);
        } else {
            tab.textContent = packName.substring(0,2).toUpperCase();
        }

        tab.onclick = () => loadPackData(packName);
        container.appendChild(tab);
    });
}

// ==========================================
// Pack Loading - Main Fix for Double Emoji Bug
// ==========================================
function loadRecentEmojis() {
    setActiveTab('recent');
    const body = document.getElementById('pickerBody');

    let section = document.getElementById('section-recent');
    if (!section) {
        section = document.createElement('div');
        section.className = 'pack-section';
        section.id = 'section-recent';
        section.innerHTML = `
            <div class="pack-title-bar">
                <div class="pack-title">Recently Used</div>
            </div>
            <div class="emoji-grid" id="grid-recent"></div>`;
        body.prepend(section);
    }

    renderRecentGrid(document.getElementById('grid-recent'));
    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/**
 * Determine best file to display for a sticker.
 * FIX for double-emoji bug: animated stickers (.tgs) are NOT displayable 
 * as images in browser. We use thumbnail instead.
 * Video stickers (.webm) can be shown as <video>.
 * Static stickers (.webp) shown as <img>.
 */
function getStickerDisplayInfo(sticker) {
    // is_animated = TGS (lottie) - NOT displayable directly
    // is_video = WebM video sticker
    // else = static WebP

    if (sticker.is_animated) {
        // Use thumbnail (which is a static webp)
        if (sticker.thumbnail) {
            return { 
                file_id: sticker.thumbnail.file_id, 
                isVideo: false,
                isAnimated: false
            };
        }
        // No thumbnail available
        return null;
    }

    if (sticker.is_video) {
        // WebM video - can display as video element
        return { 
            file_id: sticker.file_id, 
            isVideo: true,
            isAnimated: false
        };
    }

    // Static WebP
    return { 
        file_id: sticker.file_id, 
        isVideo: false,
        isAnimated: false
    };
}

/**
 * Create a displayable emoji element.
 * Returns img or video element.
 */
function createEmojiEl(emojiData) {
    const isVideo = emojiData.isVideo || 
        (emojiData.url && emojiData.url.includes('.webm'));
    
    let el;
    if (isVideo) {
        el = document.createElement('video');
        el.autoplay = true;
        el.loop = true;
        el.muted = true;
        el.playsInline = true;
        el.className = 'emoji-item';
    } else {
        el = document.createElement('img');
        el.className = 'emoji-item';
        el.alt = emojiData.fallback || '';
        el.loading = 'lazy';
        el.decoding = 'async';
        
        // Handle load error
        el.onerror = function() {
            this.classList.add('load-error');
            this.src = ''; // Stop retry
            this.alt = emojiData.fallback || '?';
            // Show fallback emoji text
            const span = document.createElement('span');
            span.style.fontSize = '18px';
            span.textContent = emojiData.fallback || '?';
            this.replaceWith(span);
        };
    }

    const src = emojiData.url || 
        (emojiData.file_id ? `/api/image?file_id=${emojiData.file_id}` : '');
    el.src = src;
    el.title = emojiData.fallback || 'Custom Emoji';

    el.addEventListener('click', () => {
        insertEmojiIntoEditor(emojiData);
    });

    return el;
}

/**
 * Insert emoji as <img> tag in editor.
 * Uses data attributes for HTML export.
 */
function insertEmojiIntoEditor(emojiData) {
    const src = emojiData.url || 
        `/api/image?file_id=${emojiData.file_id}`;
    const fallback = emojiData.fallback || '🙂';
    const id = emojiData.id || '';

    editor.focus();
    
    // Use img tag (not video) for editor display - keeps it simple
    // and avoids the double-emoji visual bug
    const html = `<img 
        class="tg-emoji-img" 
        src="${src}" 
        alt="${fallback}" 
        data-tg-id="${id}" 
        data-tg-fallback="${fallback}" 
        style="width:22px;height:22px;vertical-align:middle;margin:0 1px;display:inline-block;">`;
    
    document.execCommand('insertHTML', false, html);
    addToRecent({ ...emojiData, url: src });
    handleEditorChange();
}

async function loadPackData(packName) {
    setActiveTab(packName);
    const body = document.getElementById('pickerBody');

    // Hide welcome text
    const welcome = document.getElementById('welcomeText');
    if (welcome) welcome.style.display = 'none';

    // If already loaded successfully, just scroll to it
    if (loadedPackData.has(packName)) {
        const sec = document.getElementById(`section-${packName}`);
        if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
        return;
    }

    // If section already exists (loading or error state), scroll to it
    const existingSection = document.getElementById(`section-${packName}`);
    if (existingSection && !failedPacks.has(packName)) {
        existingSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        return;
    }

    // Remove failed section to retry
    existingSection?.remove();
    failedPacks.delete(packName);

    // Create section with loading skeletons
    const section = document.createElement('div');
    section.className = 'pack-section';
    section.id = `section-${packName}`;
    section.innerHTML = `
        <div class="pack-title-bar">
            <div class="pack-title">
                ${packName}
                <span class="pack-title-count" id="count-${packName}">Loading…</span>
            </div>
            <div class="pack-actions">
                <button class="view-pack-btn" 
                        onclick="viewPackInTelegram('${packName}')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" 
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                    View
                </button>
                <button class="remove-pack-btn" 
                        onclick="removePack('${packName}')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" 
                         stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                    Remove
                </button>
            </div>
        </div>
        <div class="emoji-grid" id="grid-${packName}"></div>`;
    body.appendChild(section);

    const grid = document.getElementById(`grid-${packName}`);
    createSkeletons(grid, 24);
    section.scrollIntoView({ behavior: 'smooth', block: 'start' });

    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 15000);

        const res = await fetch(`/api/getPack?name=${packName}`, {
            signal: controller.signal
        });
        clearTimeout(timeout);

        if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
        }

        const data = await res.json();
        grid.innerHTML = '';

        if (!data.ok) {
            showPackError(grid, packName, 
                data.description || 'Unknown error from Telegram');
            failedPacks.add(packName);
            return;
        }

        const stickers = data.result.stickers;
        if (!stickers || stickers.length === 0) {
            grid.innerHTML = `<span style="color:var(--text-3);font-size:12px;
                grid-column:span 8">This pack is empty.</span>`;
            return;
        }

        // Update count
        const countEl = document.getElementById(`count-${packName}`);
        if (countEl) countEl.textContent = `${stickers.length}`;

        const frag = document.createDocumentFragment();

        stickers.forEach((sticker, i) => {
            const displayInfo = getStickerDisplayInfo(sticker);
            
            // Skip if we can't display this sticker
            if (!displayInfo) return;

            const emojiData = {
                id: sticker.custom_emoji_id || sticker.file_unique_id || '',
                file_id: displayInfo.file_id,
                url: `/api/image?file_id=${displayInfo.file_id}`,
                fallback: sticker.emoji || '🙂',
                isVideo: displayInfo.isVideo,
                packName: packName
            };

            const el = createEmojiEl(emojiData);
            if (el) {
                // Stagger animation
                el.style.animationDelay = `${Math.min(i * 0.02, 0.5)}s`;
                frag.appendChild(el);
            }
        });

        grid.appendChild(frag);

        // Store sticker data for tab thumbnail and retry
        loadedPackData.set(packName, stickers);

        // Update tab to show first emoji
        renderTabs();

    } catch (err) {
        grid.innerHTML = '';
        failedPacks.add(packName);
        
        let errMsg = 'Network error. Check your connection.';
        if (err.name === 'AbortError') errMsg = 'Request timed out.';
        else if (err.message) errMsg = err.message;
        
        showPackError(grid, packName, errMsg);
    }
}

function showPackError(grid, packName, message) {
    grid.innerHTML = '';
    const errEl = document.createElement('div');
    errEl.className = 'error-banner';
    errEl.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" 
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span>${message}</span>
        <button class="retry-btn" onclick="retryPack('${packName}')">
            Retry
        </button>`;
    grid.appendChild(errEl);
}

function retryPack(packName) {
    failedPacks.delete(packName);
    const section = document.getElementById(`section-${packName}`);
    if (section) section.remove();
    loadPackData(packName);
}

function createSkeletons(grid, count) {
    const frag = document.createDocumentFragment();
    for (let i = 0; i < count; i++) {
        const sk = document.createElement('div');
        sk.className = 'emoji-item skeleton';
        sk.style.animationDelay = `${i * 0.04}s`;
        frag.appendChild(sk);
    }
    grid.appendChild(frag);
}

// ==========================================
// Pack Search / Filter
// ==========================================
function filterPacks(query) {
    const q = query.toLowerCase().trim();
    document.querySelectorAll('.pack-section').forEach(section => {
        if (!q || section.id === 'section-recent') {
            section.style.display = '';
            return;
        }
        const name = section.id.replace('section-', '').toLowerCase();
        section.style.display = name.includes(q) ? '' : 'none';
    });
}

// ==========================================
// Keyboard Shortcuts for Modals
// ==========================================
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        closeModal('addPackModal');
        closeModal('addLinkModal');
        closeConfirm(false);
    }
});
