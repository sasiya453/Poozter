<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Rich Message</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        textarea { width: 100%; height: 120px; margin-bottom: 15px; padding: 10px; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #3390ec; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
        button:disabled { background: #ccc; }
        #status { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <h3>Send a Message</h3>
    
    <textarea id="postText">
<b>Hello World! 👋</b>
<p>This is a very <i>simple</i> rich message.</p>
<a href="https://telegram.org">Click here to visit Telegram</a>
</textarea>
    
    <button id="sendBtn" onclick="sendPost()">Send to Bot</button>
    <p id="status"></p>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        async function sendPost() {
            const text = document.getElementById("postText").value;
            const status = document.getElementById("status");
            const btn = document.getElementById("sendBtn");

            if (!text) {
                status.innerText = "Please enter some text!";
                status.style.color = "red";
                return;
            }

            const userId = tg.initDataUnsafe?.user?.id;
            if (!userId) {
                status.innerText = "User ID not found! Open via Telegram.";
                status.style.color = "red";
                return;
            }

            btn.disabled = true;
            btn.innerText = "Sending...";
            status.innerText = "";

            // ⚠️ ඔයාගේ Cloudflare Worker URL එක මෙතනට දෙන්න
            const workerUrl = "https://poozter.sasindulasith00.workers.dev"; 

            try {
                const response = await fetch(workerUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action: "send_preview", text: text, chat_id: userId })
                });

                const result = await response.json();
                if (result.success) {
                    status.innerText = "✅ Sent successfully!";
                    status.style.color = "green";
                } else {
                    status.innerText = "❌ Error: " + (result.error || "Unknown");
                    status.style.color = "red";
                }
            } catch (error) {
                status.innerText = "❌ Network Error!";
                status.style.color = "red";
            }

            btn.disabled = false;
            btn.innerText = "Send to Bot";
        }
    </script>
</body>
</html>
