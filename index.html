<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0,
          maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Poozter Web Editor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,
wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;
1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap"
          rel="stylesheet">
    <style>
        /* ============================================================
           CSS VARIABLES
        ============================================================ */
        :root {
            --bg:#eef1f7; --surface:#fff; --surface-raised:#f8faff;
            --text-1:#0d1117; --text-2:#4a5568; --text-3:#9aa5b4;
            --accent:#3b82f6; --accent-2:#6366f1;
            --accent-glow:rgba(59,130,246,.2);
            --border:rgba(0,0,0,.07); --border-strong:rgba(0,0,0,.13);
            --toolbar-btn:rgba(0,0,0,.04);
            --toolbar-hover:rgba(59,130,246,.1);
            --spoiler-bg:#dde3ee;
            --danger:#ef4444; --danger-bg:rgba(239,68,68,.08);
            --success:#22c55e; --warning:#f59e0b;
            --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
            --shadow-md:0 4px 16px rgba(0,0,0,.07),0 2px 6px rgba(0,0,0,.04);
            --shadow-lg:0 20px 40px rgba(0,0,0,.1),0 8px 16px rgba(0,0,0,.06);
            --radius-sm:8px; --radius-md:12px;
            --radius-lg:18px; --radius-xl:24px;
            --modal-overlay:rgba(10,15,30,.45);
            --transition:.2s cubic-bezier(.4,0,.2,1);
        }
        [data-theme="dark"] {
            --bg:#0b0f18; --surface:#131929; --surface-raised:#1a2235;
            --text-1:#f0f4ff; --text-2:#7c8fa8; --text-3:#3d5066;
            --accent:#4f8ef7; --accent-2:#7c7cf7;
            --accent-glow:rgba(79,142,247,.18);
            --border:rgba(255,255,255,.06);
            --border-strong:rgba(255,255,255,.12);
            --toolbar-btn:rgba(255,255,255,.04);
            --toolbar-hover:rgba(79,142,247,.12);
            --spoiler-bg:#1f2d44;
            --danger:#f87171; --danger-bg:rgba(248,113,113,.1);
            --success:#4ade80; --warning:#fbbf24;
            --shadow-sm:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
            --shadow-md:0 4px 16px rgba(0,0,0,.35),0 2px 6px rgba(0,0,0,.2);
            --shadow-lg:0 20px 60px rgba(0,0,0,.5),0 8px 24px rgba(0,0,0,.3);
            --modal-overlay:rgba(0,0,0,.7);
        }

        *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

        body {
            font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
            background:var(--bg); color:var(--text-1);
            height:100vh; overflow:hidden;
            display:flex; justify-content:center;
            transition:background var(--transition),color var(--transition);
        }
        body::before {
            content:''; position:fixed; inset:0;
            background:
                radial-gradient(ellipse 80% 50% at 20% 10%,
                    var(--accent-glow) 0%,transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 90%,
                    rgba(99,102,241,.06) 0%,transparent 60%);
            pointer-events:none; z-index:0;
        }
        button,input { font-family:inherit; }

        /* ============================================================
           LAYOUT
        ============================================================ */
        .main-wrapper {
            display:flex; gap:20px; width:100%; max-width:1240px;
            padding:20px; height:100%; position:relative; z-index:1;
        }
        .left-column {
            flex:1; display:flex; flex-direction:column;
            gap:14px; min-width:0;
        }

        /* ============================================================
           HEADER
        ============================================================ */
        .top-header-card {
            background:var(--surface); border-radius:var(--radius-lg);
            padding:14px 20px;
            display:flex; justify-content:space-between; align-items:center;
            border:1px solid var(--border); box-shadow:var(--shadow-md);
            flex-shrink:0;
            animation:slideDown .4s cubic-bezier(.34,1.56,.64,1) both;
        }
        @keyframes slideDown {
            from { opacity:0; transform:translateY(-12px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .header-user-info {
            display:flex; align-items:center; gap:14px; overflow:hidden;
        }
        .user-avatar-wrapper { position:relative; flex-shrink:0; }
        .user-avatar {
            width:44px; height:44px; border-radius:50%; object-fit:cover;
            border:2px solid var(--accent-glow);
            box-shadow:0 0 0 2px var(--accent-glow);
        }
        .user-avatar-placeholder {
            width:44px; height:44px; border-radius:50%;
            background:linear-gradient(135deg,var(--accent),var(--accent-2));
            color:#fff; display:flex; align-items:center; justify-content:center;
            font-size:18px; font-weight:700; text-transform:uppercase;
            box-shadow:0 4px 12px var(--accent-glow); flex-shrink:0;
        }
        .status-dot {
            position:absolute; bottom:1px; right:1px;
            width:10px; height:10px; background:var(--success);
            border-radius:50%; border:2px solid var(--surface);
            animation:pulse-dot 2s ease infinite;
        }
        @keyframes pulse-dot {
            0%,100% { box-shadow:0 0 0 0 rgba(34,197,94,.4); }
            50%      { box-shadow:0 0 0 4px rgba(34,197,94,0); }
        }
        .header-text-block {
            display:flex; flex-direction:column; gap:1px; overflow:hidden;
        }
        .app-title {
            font-size:10px; font-weight:700; color:var(--accent);
            text-transform:uppercase; letter-spacing:1.2px; opacity:.8;
        }
        .greeting-line {
            font-size:15px; font-weight:600;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
        }
        .greeting-text  { color:var(--text-2); font-weight:400; margin-right:4px; }
        .user-name-text { color:var(--text-1); }
        .header-actions { display:flex; align-items:center; gap:8px; flex-shrink:0; }

        .icon-btn {
            background:var(--toolbar-btn); border:1px solid var(--border);
            color:var(--text-2); cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            width:38px; height:38px; border-radius:var(--radius-sm);
            transition:all var(--transition);
        }
        .icon-btn:hover {
            color:var(--accent); border-color:var(--accent);
            transform:translateY(-1px);
            box-shadow:0 4px 12px var(--accent-glow);
        }
        .icon-btn svg { width:18px; height:18px; }

        .btn-clear-text {
            background:var(--toolbar-btn); border:1px solid var(--border);
            color:var(--text-2); cursor:pointer;
            display:flex; align-items:center; justify-content:center; gap:6px;
            height:38px; padding:0 14px; border-radius:var(--radius-sm);
            font-size:13px; font-weight:600; white-space:nowrap;
            transition:all var(--transition);
        }
        .btn-clear-text:hover {
            color:var(--danger); border-color:var(--danger);
            background:var(--danger-bg); transform:translateY(-1px);
        }
        .btn-clear-text svg { width:15px; height:15px; }

        .btn-copy-html {
            background:linear-gradient(135deg,var(--accent),var(--accent-2));
            color:#fff; border:none; padding:0 18px; height:38px;
            border-radius:var(--radius-sm); cursor:pointer;
            font-weight:600; font-size:13.5px; letter-spacing:.2px;
            display:flex; align-items:center; gap:8px;
            box-shadow:0 4px 12px var(--accent-glow);
            transition:all var(--transition); white-space:nowrap;
        }
        .btn-copy-html:hover {
            transform:translateY(-1px);
            box-shadow:0 6px 20px var(--accent-glow);
        }
        .btn-copy-html.success {
            background:linear-gradient(135deg,var(--success),#16a34a);
            box-shadow:0 4px 12px rgba(34,197,94,.3);
        }
        .btn-copy-html svg { width:16px; height:16px; }

        /* ============================================================
           EDITOR
        ============================================================ */
        .editor-container {
            flex:1; background:var(--surface);
            border-radius:var(--radius-lg); box-shadow:var(--shadow-md);
            display:flex; flex-direction:column;
            overflow:hidden; border:1px solid var(--border);
            transition:background var(--transition),
                border-color var(--transition), box-shadow var(--transition);
            animation:slideUp .4s cubic-bezier(.34,1.56,.64,1) .05s both;
            min-height:0;
        }
        .editor-container:focus-within {
            border-color:var(--accent);
            box-shadow:var(--shadow-md),0 0 0 3px var(--accent-glow);
        }
        @keyframes slideUp {
            from { opacity:0; transform:translateY(12px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .toolbar {
            display:flex; gap:3px; padding:8px 14px;
            background:var(--surface-raised);
            border-bottom:1px solid var(--border);
            align-items:center; flex-shrink:0; flex-wrap:wrap;
        }
        .toolbar-btn {
            width:34px; height:34px; border:1px solid transparent;
            background:transparent; cursor:pointer;
            border-radius:var(--radius-sm); color:var(--text-2);
            display:flex; align-items:center; justify-content:center;
            transition:all var(--transition); position:relative; flex-shrink:0;
        }
        .toolbar-btn:hover {
            background:var(--toolbar-hover); color:var(--accent);
            border-color:var(--border); transform:translateY(-1px);
        }
        .toolbar-btn:active { transform:translateY(0) scale(.95); }
        .toolbar-btn svg { width:17px; height:17px; }
        .toolbar-divider {
            width:1px; height:22px; background:var(--border-strong);
            margin:0 3px; border-radius:2px; flex-shrink:0;
        }
        .toolbar-btn[title]:hover::after {
            content:attr(title);
            position:absolute; bottom:calc(100% + 6px); left:50%;
            transform:translateX(-50%);
            background:var(--text-1); color:var(--surface);
            font-size:11px; font-weight:500; padding:4px 8px;
            border-radius:6px; white-space:nowrap; pointer-events:none;
            z-index:100; box-shadow:var(--shadow-sm);
        }

        .editor {
            flex:1; padding:20px 24px; outline:none;
            font-size:15px; line-height:1.8; overflow-y:auto;
            color:var(--text-1); font-weight:400;
            word-break:break-word; white-space:pre-wrap;
        }
        .editor:empty::before {
            content:attr(placeholder); color:var(--text-3);
            pointer-events:none; font-style:italic;
        }

        /* Emoji images inside editor */
        .editor .tg-emoji {
            display:inline-block;
            width:22px; height:22px;
            vertical-align:middle;
            margin:0 1px;
            object-fit:contain;
            pointer-events:none;
            user-select:none;
            -webkit-user-select:none;
            -webkit-user-drag:none;
            border-radius:3px;
            flex-shrink:0;
        }

        .editor blockquote {
            border-left:3px solid var(--accent);
            padding:8px 14px; margin:8px 0; color:var(--text-2);
            font-style:italic; background:var(--accent-glow);
            border-radius:0 var(--radius-sm) var(--radius-sm) 0;
        }
        .editor code {
            font-family:'JetBrains Mono',monospace;
            background:var(--toolbar-btn); padding:2px 7px;
            border-radius:5px; color:var(--accent); font-size:.875em;
            border:1px solid var(--border);
        }
        .editor a { color:var(--accent); text-underline-offset:2px; }

        .tg-spoiler {
            background:var(--spoiler-bg); color:transparent;
            border-radius:4px; padding:1px 5px; cursor:pointer;
            transition:all var(--transition); user-select:none;
        }
        .tg-spoiler.revealed, .tg-spoiler:hover { color:var(--text-1); }

        /* Editor Footer */
        .editor-footer {
            display:flex; justify-content:space-between; align-items:center;
            padding:8px 16px;
            background:var(--surface-raised); border-top:1px solid var(--border);
            font-size:11px; font-weight:600; color:var(--text-3); flex-shrink:0;
        }
        .save-status { display:flex; align-items:center; gap:5px; }
        .char-info   { display:flex; align-items:center; gap:10px; }
        .char-counter { display:flex; align-items:center; gap:4px; }
        .char-counter.warning { color:var(--warning); }
        .char-counter.danger  { color:var(--danger); }
        .char-progress {
            width:60px; height:3px; background:var(--border);
            border-radius:10px; overflow:hidden;
        }
        .char-progress-fill {
            height:100%; background:var(--success); border-radius:10px;
            transition:width .3s ease, background .3s ease;
        }

        ::-webkit-scrollbar { width:5px; height:5px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb {
            background:var(--border-strong); border-radius:10px;
        }
        ::-webkit-scrollbar-thumb:hover { background:var(--text-3); }

        /* ============================================================
           EMOJI PICKER — picker items must NOT steal focus
        ============================================================ */
        .emoji-picker-wrapper {
            width:370px; background:var(--surface);
            border-radius:var(--radius-lg);
            display:flex; flex-direction:column; overflow:hidden;
            box-shadow:var(--shadow-md); flex-shrink:0;
            border:1px solid var(--border);
            animation:slideLeft .4s cubic-bezier(.34,1.56,.64,1) .1s both;
        }
        @keyframes slideLeft {
            from { opacity:0; transform:translateX(16px); }
            to   { opacity:1; transform:translateX(0); }
        }

        /* Prevent any child of the picker from stealing editor focus */
        .emoji-picker-wrapper {
            -webkit-user-select:none;
            user-select:none;
        }

        .picker-header {
            padding:12px 16px; border-bottom:1px solid var(--border);
            display:flex; justify-content:space-between; align-items:center;
            background:var(--surface-raised); flex-shrink:0;
        }
        .picker-header-title {
            font-size:13px; font-weight:700; color:var(--text-1);
            display:flex; align-items:center; gap:7px;
        }
        .picker-header-title svg { width:15px; height:15px; color:var(--accent); }
        .header-btn-group { display:flex; gap:7px; align-items:center; }

        .btn-add-pack {
            background:linear-gradient(135deg,var(--accent),var(--accent-2));
            color:#fff; border:none; padding:6px 12px;
            border-radius:var(--radius-sm); font-weight:600; font-size:12px;
            cursor:pointer; display:flex; align-items:center; gap:5px;
            box-shadow:0 2px 8px var(--accent-glow);
            transition:all var(--transition);
        }
        .btn-add-pack:hover {
            transform:translateY(-1px);
            box-shadow:0 4px 12px var(--accent-glow);
        }
        .btn-add-pack svg { width:12px; height:12px; }

        .clear-packs-btn {
            font-size:12px; font-weight:600; cursor:pointer;
            color:var(--text-3); background:transparent;
            border:1px solid var(--border); padding:5px 9px;
            border-radius:var(--radius-sm); transition:all var(--transition);
            display:flex; align-items:center; gap:4px;
        }
        .clear-packs-btn:hover {
            color:var(--danger); border-color:var(--danger);
            background:var(--danger-bg);
        }
        .clear-packs-btn svg { width:12px; height:12px; }

        /* Search */
        .picker-search {
            padding:10px 16px; border-bottom:1px solid var(--border);
            background:var(--surface-raised); flex-shrink:0;
        }
        .picker-search-wrapper { position:relative; }
        .picker-search input {
            width:100%; padding:8px 12px 8px 34px;
            border-radius:var(--radius-sm);
            border:1.5px solid var(--border-strong);
            background:var(--surface); color:var(--text-1);
            font-size:13px; outline:none; font-family:inherit;
            transition:all var(--transition);
            /* allow text selection in search input */
            user-select:text; -webkit-user-select:text;
        }
        .picker-search input:focus {
            border-color:var(--accent);
            box-shadow:0 0 0 3px var(--accent-glow);
        }
        .picker-search input::placeholder { color:var(--text-3); }
        .picker-search-icon {
            position:absolute; left:10px; top:50%;
            transform:translateY(-50%); color:var(--text-3); pointer-events:none;
        }
        .picker-search-icon svg { width:14px; height:14px; }

        .picker-body { flex:1; overflow-y:auto; padding:14px 16px; }
        .pack-section { margin-bottom:22px; animation:fadeInUp .3s ease both; }
        @keyframes fadeInUp {
            from { opacity:0; transform:translateY(8px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .pack-title-bar {
            display:flex; justify-content:space-between; align-items:center;
            position:sticky; top:-14px; background:var(--surface);
            padding:8px 0; z-index:2; margin-bottom:10px;
        }
        .pack-title-bar::before {
            content:''; position:absolute; top:-14px;
            left:-16px; right:-16px; height:14px; background:var(--surface);
        }
        .pack-title-left { display:flex; align-items:center; gap:8px; }
        .pack-title {
            font-size:11px; font-weight:700; text-transform:uppercase;
            letter-spacing:1px; color:var(--text-3);
        }
        .pack-title-count {
            font-size:10px; color:var(--text-3); background:var(--toolbar-btn);
            padding:1px 6px; border-radius:20px; font-weight:600;
        }
        .pack-actions { display:flex; gap:5px; }
        .view-pack-btn, .remove-pack-btn {
            font-size:11px; font-weight:600; padding:4px 8px;
            border-radius:6px; cursor:pointer;
            transition:all var(--transition); border:none;
            display:flex; align-items:center; gap:3px;
        }
        .view-pack-btn { color:var(--accent); background:var(--toolbar-hover); }
        .view-pack-btn:hover { background:rgba(59,130,246,.2); }
        .view-pack-btn svg { width:11px; height:11px; }
        .remove-pack-btn { color:var(--text-3); background:transparent; }
        .remove-pack-btn:hover { color:var(--danger); background:var(--danger-bg); }
        .remove-pack-btn svg { width:11px; height:11px; }

        .emoji-grid {
            display:grid; grid-template-columns:repeat(8,1fr); gap:4px;
        }
        .emoji-grid-item {
            position:relative; width:100%; aspect-ratio:1;
            cursor:pointer; border-radius:var(--radius-sm);
            border:1px solid transparent; background:transparent;
            display:flex; align-items:center; justify-content:center;
            transition:all .15s cubic-bezier(.34,1.56,.64,1);
            overflow:hidden;
            /* no focus outline on tap */
            outline:none;
            -webkit-tap-highlight-color:transparent;
        }
        .emoji-grid-item:hover {
            transform:scale(1.2); background:var(--toolbar-hover);
            border-color:var(--border);
            box-shadow:0 4px 12px rgba(0,0,0,.12); z-index:2;
        }
        .emoji-grid-item:active { transform:scale(.93); }
        .emoji-grid-item img,
        .emoji-grid-item video {
            width:32px; height:32px; object-fit:contain;
            display:block; pointer-events:none;
        }

        /* Skeleton */
        .skeleton-item {
            width:100%; aspect-ratio:1; border-radius:var(--radius-sm);
            background:linear-gradient(90deg,
                var(--border) 25%,var(--toolbar-btn) 50%,var(--border) 75%);
            background-size:200% 100%;
            animation:shimmer 1.4s infinite;
        }
        @keyframes shimmer {
            0%   { background-position:200% 0; }
            100% { background-position:-200% 0; }
        }

        /* Tabs */
        .picker-tabs {
            display:flex; overflow-x:auto;
            background:var(--surface-raised);
            padding:8px 12px; gap:6px; align-items:center;
            border-top:1px solid var(--border); flex-shrink:0;
        }
        .picker-tabs::-webkit-scrollbar { display:none; }
        .pack-tab {
            min-width:34px; height:34px; border-radius:var(--radius-sm);
            cursor:pointer; opacity:.5; transition:all var(--transition);
            display:flex; justify-content:center; align-items:center;
            background:var(--surface); border:1.5px solid transparent;
            font-size:11px; font-weight:700; color:var(--text-2);
            flex-shrink:0; padding:0 4px;
            outline:none;
            -webkit-tap-highlight-color:transparent;
        }
        .pack-tab:hover { opacity:.85; transform:translateY(-2px); }
        .pack-tab.active {
            opacity:1; border-color:var(--accent); color:var(--accent);
            background:var(--toolbar-hover);
            box-shadow:0 2px 8px var(--accent-glow);
        }
        .pack-tab img {
            width:22px; height:22px; object-fit:contain; pointer-events:none;
        }

        /* Error / Status */
        .status-text {
            color:var(--text-3); font-size:13px; text-align:center;
            margin-top:40px; line-height:1.8;
        }
        .status-text svg {
            display:block; margin:0 auto 12px;
            width:36px; height:36px; opacity:.3;
        }
        .error-banner {
            background:var(--danger-bg); color:var(--danger);
            padding:10px 14px; border-radius:var(--radius-sm);
            font-size:12px; font-weight:600;
            display:flex; align-items:center; gap:8px;
            grid-column:span 8; border:1px solid rgba(239,68,68,.2);
        }
        .error-banner svg { width:14px; height:14px; flex-shrink:0; }
        .retry-btn {
            background:var(--danger); color:#fff; border:none;
            padding:4px 10px; border-radius:6px; font-size:11px;
            font-weight:600; cursor:pointer; margin-left:auto;
            font-family:inherit;
        }

        /* ============================================================
           MODALS
        ============================================================ */
        .modal-overlay {
            position:fixed; inset:0; background:var(--modal-overlay);
            z-index:1000; display:none; justify-content:center;
            align-items:center;
            backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
            opacity:0; transition:opacity .2s ease;
        }
        .modal-overlay.active  { display:flex; }
        .modal-overlay.visible { opacity:1; }
        .modal-content {
            background:var(--surface); border-radius:var(--radius-xl);
            width:90%; max-width:360px; box-shadow:var(--shadow-lg);
            border:1px solid var(--border-strong); overflow:hidden;
            transform:scale(.94) translateY(10px);
            transition:transform .25s cubic-bezier(.34,1.56,.64,1);
        }
        .modal-overlay.visible .modal-content {
            transform:scale(1) translateY(0);
        }
        .modal-header {
            padding:20px 22px 0;
            display:flex; justify-content:space-between; align-items:center;
        }
        .modal-header h3 {
            font-size:17px; font-weight:700; color:var(--text-1);
            display:flex; align-items:center; gap:8px;
        }
        .modal-header h3 svg { width:18px; height:18px; color:var(--accent); }
        .modal-subtitle {
            font-size:12.5px; color:var(--text-2); padding:6px 22px 0;
        }
        .close-modal-btn {
            background:var(--toolbar-btn); border:1px solid var(--border);
            width:30px; height:30px; border-radius:8px; color:var(--text-2);
            cursor:pointer; display:flex; align-items:center;
            justify-content:center; transition:all var(--transition);
        }
        .close-modal-btn:hover {
            color:var(--text-1); border-color:var(--border-strong);
        }
        .close-modal-btn svg { width:14px; height:14px; }
        .modal-body { padding:18px 22px 22px; }
        .input-group { display:flex; gap:8px; margin-bottom:14px; }
        .pack-input {
            flex:1; padding:11px 14px; border-radius:var(--radius-sm);
            border:1.5px solid var(--border-strong);
            background:var(--surface-raised); color:var(--text-1);
            outline:none; font-size:14px; font-family:inherit;
            transition:all var(--transition);
            user-select:text; -webkit-user-select:text;
        }
        .pack-input::placeholder { color:var(--text-3); }
        .pack-input:focus {
            border-color:var(--accent);
            box-shadow:0 0 0 3px var(--accent-glow);
        }
        .paste-btn {
            background:var(--toolbar-btn);
            border:1.5px solid var(--border-strong);
            border-radius:var(--radius-sm); padding:0 13px;
            cursor:pointer; color:var(--text-2);
            transition:all var(--transition);
            display:flex; align-items:center;
        }
        .paste-btn:hover {
            background:var(--toolbar-hover); color:var(--accent);
            border-color:var(--accent);
        }
        .btn-full {
            width:100%; padding:12px;
            background:linear-gradient(135deg,var(--accent),var(--accent-2));
            color:#fff; border:none; border-radius:var(--radius-sm);
            cursor:pointer; font-weight:700; font-size:14px;
            font-family:inherit; box-shadow:0 4px 12px var(--accent-glow);
            transition:all var(--transition); letter-spacing:.2px;
        }
        .btn-full:hover {
            transform:translateY(-1px);
            box-shadow:0 6px 18px var(--accent-glow);
        }

        /* Confirm dialog */
        .confirm-overlay {
            position:fixed; inset:0; background:var(--modal-overlay);
            z-index:2000; display:none; justify-content:center;
            align-items:center; backdrop-filter:blur(4px);
        }
        .confirm-overlay.active { display:flex; }
        .confirm-box {
            background:var(--surface); border-radius:var(--radius-lg);
            padding:24px; width:88%; max-width:300px;
            box-shadow:var(--shadow-lg); border:1px solid var(--border-strong);
            text-align:center;
        }
        .confirm-icon { font-size:32px; margin-bottom:12px; }
        .confirm-box h4 {
            font-size:15px; font-weight:700; margin-bottom:6px; color:var(--text-1);
        }
        .confirm-box p {
            font-size:13px; color:var(--text-2);
            margin-bottom:18px; line-height:1.5;
        }
        .confirm-btns { display:flex; gap:10px; }
        .confirm-btns button {
            flex:1; padding:10px; border-radius:var(--radius-sm);
            font-weight:600; font-size:13.5px; font-family:inherit;
            cursor:pointer; transition:all var(--transition);
            border:1px solid var(--border-strong);
        }
        .confirm-cancel { background:var(--toolbar-btn); color:var(--text-2); }
        .confirm-cancel:hover { background:var(--border); }
        .confirm-ok {
            background:var(--danger)!important;
            color:#fff!important; border-color:transparent!important;
        }
        .confirm-ok:hover { opacity:.88; }

        /* Toast */
        .toast {
            position:fixed; bottom:24px; left:50%;
            transform:translateX(-50%) translateY(20px);
            background:var(--text-1); color:var(--surface);
            padding:10px 18px; border-radius:100px;
            font-size:13px; font-weight:600; z-index:9999;
            opacity:0; transition:all .3s cubic-bezier(.34,1.56,.64,1);
            pointer-events:none; white-space:nowrap;
            box-shadow:var(--shadow-lg); max-width:calc(100vw - 40px);
        }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

        @keyframes spin { to { transform:rotate(360deg); } }

        /* ============================================================
           RESPONSIVE
        ============================================================ */
        @media (max-width:768px) {
            .main-wrapper {
                flex-direction:column; padding:0; gap:0;
                height:100vh; height:100dvh;
            }
            body::before { display:none; }
            .left-column { flex:0 0 auto; gap:0; }
            .top-header-card {
                border-radius:0; border:none;
                border-bottom:1px solid var(--border);
                padding:10px 14px; box-shadow:none; animation:none;
            }
            .user-avatar,
            .user-avatar-placeholder { width:36px; height:36px; font-size:14px; }
            .app-title { display:none; }
            .greeting-line { font-size:13px; }
            .btn-copy-html .btn-label { display:none; }
            .btn-copy-html { padding:0 12px; min-width:38px; }
            .btn-clear-text .lbl { display:none; }
            .btn-clear-text { padding:0 10px; }
            .editor-container {
                flex:0 0 38vh; border-radius:0; border:none;
                border-bottom:1px solid var(--border);
                box-shadow:none; animation:none;
            }
            .toolbar {
                padding:6px 10px; gap:2px;
                overflow-x:auto; flex-wrap:nowrap;
            }
            .toolbar::-webkit-scrollbar { display:none; }
            .toolbar-btn { width:32px; height:32px; flex-shrink:0; }
            .toolbar-btn[title]:hover::after { display:none; }
            .editor { padding:14px 16px; font-size:14px; }
            .emoji-picker-wrapper {
                width:100%; flex:1; border-radius:0;
                border:none; box-shadow:none; animation:none;
            }
            .emoji-grid { grid-template-columns:repeat(7,1fr); gap:3px; }
            .picker-header { padding:10px 14px; }
        }
        @media (max-width:380px) {
            .emoji-grid { grid-template-columns:repeat(6,1fr); }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
  <!-- ═══ LEFT COLUMN ═══════════════════════════════════════════════ -->
  <div class="left-column">

    <!-- Header -->
    <div class="top-header-card">
      <div class="header-user-info">
        <div class="user-avatar-wrapper">
          <img id="user-avatar" class="user-avatar"
               src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
               alt="" style="display:none">
          <div id="user-avatar-placeholder" class="user-avatar-placeholder">U</div>
          <div class="status-dot"></div>
        </div>
        <div class="header-text-block">
          <span class="app-title">Poozter Editor</span>
          <div class="greeting-line">
            <span id="greeting-text" class="greeting-text">Welcome,</span>
            <span id="user-name"     class="user-name-text">Creator</span>
          </div>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme">
          <svg id="themeIcon" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round"></svg>
        </button>
        <button class="btn-clear-text" onclick="clearEditorText()" title="Clear editor">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
          </svg>
          <span class="lbl">Clear</span>
        </button>
        <button class="btn-copy-html" id="copyBtn" onclick="copyHTML()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          <span class="btn-label">Copy HTML</span>
        </button>
      </div>
    </div>

    <!-- Editor -->
    <div class="editor-container">
      <div class="toolbar">
        <button class="toolbar-btn" onclick="fmt('bold')"
                title="Bold (Ctrl+B)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/>
            <path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/>
          </svg>
        </button>
        <button class="toolbar-btn" onclick="fmt('italic')"
                title="Italic (Ctrl+I)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="4" x2="10" y2="4"/>
            <line x1="14" y1="20" x2="5" y2="20"/>
            <line x1="15" y1="4" x2="9" y2="20"/>
          </svg>
        </button>
        <button class="toolbar-btn" onclick="fmt('underline')"
                title="Underline (Ctrl+U)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 3v7a6 6 0 0 0 6 6 6 6 0 0 0 6-6V3"/>
            <line x1="4" y1="21" x2="20" y2="21"/>
          </svg>
        </button>
        <button class="toolbar-btn" onclick="fmt('strikeThrough')"
                title="Strikethrough (Ctrl+Shift+X)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 4H9a3 3 0 0 0-2.83 4"/>
            <path d="M14 12a4 4 0 0 1 0 8H6"/>
            <line x1="4" y1="12" x2="20" y2="12"/>
          </svg>
        </button>
        <div class="toolbar-divider"></div>
        <button class="toolbar-btn" onclick="wrapBlock('blockquote')"
                title="Blockquote (Ctrl+Shift+.)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/>
            <path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/>
          </svg>
        </button>
        <button class="toolbar-btn" onclick="wrapBlock('code')"
                title="Monospace (Ctrl+Shift+M)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 18 22 12 16 6"/>
            <polyline points="8 6 2 12 8 18"/>
          </svg>
        </button>
        <button class="toolbar-btn" onclick="wrapBlock('tg-spoiler')"
                title="Spoiler (Ctrl+Shift+P)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
        <div class="toolbar-divider"></div>
        <button class="toolbar-btn" onclick="openLinkModal()"
                title="Link (Ctrl+K)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
        </button>
        <button class="toolbar-btn" onclick="insertDate()"
                title="Insert Date (Ctrl+Shift+D)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8"  y1="2" x2="8"  y2="6"/>
            <line x1="3"  y1="10" x2="21" y2="10"/>
          </svg>
        </button>
        <button class="toolbar-btn" onclick="clearFormat()"
                title="Clear Format (Ctrl+Shift+N)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            <line x1="2" y1="2" x2="22" y2="22"/>
          </svg>
        </button>
      </div>

      <div class="editor" id="editor"
           contenteditable="true"
           placeholder="Type your message here…"
           spellcheck="true"></div>

      <div class="editor-footer">
        <div class="save-status" id="saveStatus">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
               style="width:12px;height:12px">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          Draft saved
        </div>
        <div class="char-info">
          <div class="char-progress">
            <div class="char-progress-fill" id="charFill"></div>
          </div>
          <div class="char-counter" id="charCounter">0 / 1024</div>
        </div>
      </div>
    </div>
  </div><!-- /left-column -->

  <!-- ═══ EMOJI PICKER ══════════════════════════════════════════════ -->
  <div class="emoji-picker-wrapper">
    <div class="picker-header">
      <div class="picker-header-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
          <line x1="9"  y1="9" x2="9.01"  y2="9"/>
          <line x1="15" y1="9" x2="15.01" y2="9"/>
        </svg>
        Stickers & Emoji
      </div>
      <div class="header-btn-group">
        <button class="btn-add-pack" onclick="openAddModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5"  y1="12" x2="19" y2="12"/>
          </svg>
          Add Pack
        </button>
        <button class="clear-packs-btn" onclick="clearAllData()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
          </svg>
          Clear
        </button>
      </div>
    </div>

    <div class="picker-search">
      <div class="picker-search-wrapper">
        <div class="picker-search-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </div>
        <input type="text" id="emojiSearch"
               placeholder="Search packs…"
               oninput="filterPacks(this.value)">
      </div>
    </div>

    <div class="picker-body" id="pickerBody">
      <div id="welcomeText" class="status-text" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
          <line x1="9"  y1="9" x2="9.01"  y2="9"/>
          <line x1="15" y1="9" x2="15.01" y2="9"/>
        </svg>
        No packs added yet.<br>Tap <strong>Add Pack</strong> to get started.
      </div>
    </div>

    <div class="picker-tabs" id="pickerTabs"></div>
  </div>
</div>

<!-- ═══ MODALS ══════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="addPackModal"
     onclick="handleOverlayClick(event,'addPackModal')">
  <div class="modal-content">
    <div class="modal-header">
      <h3>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="12" y1="8" x2="12" y2="16"/>
          <line x1="8"  y1="12" x2="16" y2="12"/>
        </svg>
        Add Emoji Pack
      </h3>
      <button class="close-modal-btn" onclick="closeModal('addPackModal')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6"  y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <p class="modal-subtitle">Enter a pack name or paste a t.me link</p>
    <div class="modal-body">
      <div class="input-group">
        <input class="pack-input" type="text" id="packInput"
               placeholder="e.g. NewsEmoji or t.me/addemoji/…"
               onkeypress="if(event.key==='Enter')addNewPack()">
        <button class="paste-btn" onclick="pasteClip('packInput')"
                title="Paste">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
          </svg>
        </button>
      </div>
      <button class="btn-full" onclick="addNewPack()">Add Pack</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="addLinkModal"
     onclick="handleOverlayClick(event,'addLinkModal')">
  <div class="modal-content">
    <div class="modal-header">
      <h3>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        Insert Link
      </h3>
      <button class="close-modal-btn" onclick="closeModal('addLinkModal')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6"  y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <p class="modal-subtitle">Enter the URL for your selected text</p>
    <div class="modal-body">
      <div class="input-group">
        <input class="pack-input" type="url" id="linkInput"
               placeholder="https://…"
               onkeypress="if(event.key==='Enter')confirmLink()">
        <button class="paste-btn" onclick="pasteClip('linkInput')"
                title="Paste">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
          </svg>
        </button>
      </div>
      <button class="btn-full" onclick="confirmLink()">Insert Link</button>
    </div>
  </div>
</div>

<!-- Custom confirm -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon" id="confirmIcon">⚠️</div>
    <h4 id="confirmTitle">Are you sure?</h4>
    <p  id="confirmMsg">This action cannot be undone.</p>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="closeConfirm(false)">Cancel</button>
      <button class="confirm-ok"     onclick="closeConfirm(true)">Confirm</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

/* ──────────────────────────────────────────────────────────────────
   TELEGRAM MINI APP
────────────────────────────────────────────────────────────────── */
const tgApp = window.Telegram?.WebApp;
if (tgApp) { tgApp.ready(); tgApp.expand(); }

(function initUser() {
    const user        = tgApp?.initDataUnsafe?.user;
    const avatarImg   = document.getElementById('user-avatar');
    const placeholder = document.getElementById('user-avatar-placeholder');
    const nameEl      = document.getElementById('user-name');
    const greetEl     = document.getElementById('greeting-text');
    if (!user) return;

    nameEl.textContent = [user.first_name, user.last_name]
        .filter(Boolean).join(' ') || 'Creator';

    const h = new Date().getHours();
    greetEl.textContent =
        h < 5  ? 'Good night,'     :
        h < 12 ? 'Good morning,'   :
        h < 17 ? 'Good afternoon,' :
        h < 21 ? 'Good evening,'   : 'Good night,';

function _lum(hex) {
    if (!hex?.startsWith('#')) return 255;
    const c = hex.replace('#', '');
    const f = c.length === 3 ? c.split('').map(x => x + x).join('') : c;
    const n = parseInt(f, 16);
    return .2126 * ((n >> 16) & 255) +
           .7152 * ((n >>  8) & 255) +
           .0722 * ( n        & 255);
}
const _dark0 = tgApp?.themeParams?.bg_color
    ? _lum(tgApp.themeParams.bg_color) < 128
    : window.matchMedia('(prefers-color-scheme:dark)').matches;

/* ──────────────────────────────────────────────────────────────────
   MOBILE DETECTION
────────────────────────────────────────────────────────────────── */
function isMobile() {
    return window.matchMedia('(max-width:768px)').matches ||
           ('ontouchstart' in window);
}

/* ──────────────────────────────────────────────────────────────────
   EDITOR — CARET PERSISTENCE
   ─────────────────────────────────────────────────────────────────
   We track the caret position at ALL times using selectionchange.
   Before inserting an emoji we always restore this saved position.
   On mobile we restore the caret WITHOUT calling editor.focus()
   so the keyboard does not open when browsing emoji packs.
────────────────────────────────────────────────────────────────── */
const editor = document.getElementById('editor');
let _savedCaret = null;

/** Snapshot the current caret if it is inside the editor. */
function saveCaret() {
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) return;
    const range = sel.getRangeAt(0);
    if (editor.contains(range.commonAncestorContainer)) {
        _savedCaret = range.cloneRange();
    }
}

/**
 * Restore the saved caret.
 * @param {boolean} focusEditor – if false, sets the selection without
 *   calling editor.focus() (avoids opening the keyboard on mobile).
 */
function restoreCaret(focusEditor = true) {
    if (focusEditor) editor.focus();

    if (!_savedCaret) {
        /* No saved position → collapse to end of editor */
        const range = document.createRange();
        range.selectNodeContents(editor);
        range.collapse(false);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        _savedCaret = range.cloneRange();
        return;
    }

    try {
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(_savedCaret);
    } catch {
        /* Range became stale — fall back to end */
        _savedCaret = null;
        restoreCaret(focusEditor);
    }
}

/*
 * Track selection changes globally.
 * Whenever the selection moves inside the editor, save it.
 */
document.addEventListener('selectionchange', () => {
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) return;
    const range = sel.getRangeAt(0);
    if (editor.contains(range.commonAncestorContainer)) {
        _savedCaret = range.cloneRange();
    }
});

/* Belt-and-suspenders: also save on blur */
editor.addEventListener('blur', saveCaret);

/* ──────────────────────────────────────────────────────────────────
   EDITOR — helpers
────────────────────────────────────────────────────────────────── */
function fmt(cmd) {
    editor.focus();
    document.execCommand(cmd, false, null);
}

/* For Link modal — separate saved range so it doesn't conflict */
let _savedLinkRange = null;
function saveLinkRange() {
    const sel = window.getSelection();
    _savedLinkRange = (sel && sel.rangeCount)
        ? sel.getRangeAt(0).cloneRange() : null;
}
function restoreLinkRange() {
    if (!_savedLinkRange) return;
    editor.focus();
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(_savedLinkRange);
}

/**
 * Place the cursor just after `node` using an invisible zero-width char.
 * This gives the browser a text node to anchor the caret in,
 * which prevents it from jumping to position 0.
 */
function placeCursorAfter(node) {
    const zwnj = document.createTextNode('\u200B');
    node.after(zwnj);
    const sel = window.getSelection();
    const r   = document.createRange();
    r.setStartAfter(zwnj);
    r.collapse(true);
    sel.removeAllRanges();
    sel.addRange(r);
    _savedCaret = r.cloneRange(); // keep _savedCaret in sync
}

/* ──────────────────────────────────────────────────────────────────
   EMOJI INSERTION
────────────────────────────────────────────────────────────────── */
function insertEmoji(data) {
    /*
     * KEY FIX — mobile vs desktop behaviour:
     *
     * Desktop: restore caret WITH focus (editor.focus() called).
     *          mousedown:preventDefault on picker items keeps the
     *          editor focused, so this is a no-op in practice.
     *
     * Mobile:  restore caret WITHOUT focus so the keyboard does
     *          NOT pop up when the user is just browsing packs.
     *          The selection is still set correctly so the emoji
     *          lands in the right place.
     */
    const mobile = isMobile();
    restoreCaret(!mobile);   // ← pass false on mobile

    /* For video stickers we use the static thumbnail in the editor
       (we never insert <video> into contenteditable). */
    const src = (data.isVideo && data.thumbUrl)
        ? data.thumbUrl
        : data.url;

    if (!src) {
        /* Absolute fallback: insert the unicode emoji as plain text */
        document.execCommand('insertText', false, data.fallback || '🙂');
        onEdit();
        addToRecent(data);
        return;
    }

    /* Build the <img> element */
    const img = document.createElement('img');
    img.className = 'tg-emoji';
    img.src       = src;
    img.alt       = data.fallback || '🙂';
    img.setAttribute('data-tg-id',       data.id       || '');
    img.setAttribute('data-tg-fallback', data.fallback || '🙂');
    img.draggable = false;

    img.onerror = function () {
        /* If the image fails to load, replace with the fallback char */
        const txt = document.createTextNode(
            this.getAttribute('data-tg-fallback') || '🙂');
        this.replaceWith(txt);
        onEdit();
    };

    /* Insert at the restored caret position */
    const sel = window.getSelection();
    if (sel && sel.rangeCount) {
        const range = sel.getRangeAt(0);
        range.deleteContents();
        range.insertNode(img);
        placeCursorAfter(img);
    } else {
        editor.appendChild(img);
        placeCursorAfter(img);
    }

    addToRecent(data);
    onEdit();
}

/* ──────────────────────────────────────────────────────────────────
   FORMAT BLOCKS
────────────────────────────────────────────────────────────────── */
function wrapBlock(type) {
    editor.focus();
    const sel = window.getSelection();
    if (!sel.rangeCount) return;

    /* Detect and remove existing wrapper of the same type */
    let node = sel.anchorNode;
    while (node && node !== editor) {
        if (node.nodeType === 1) {
            const match =
                (type === 'tg-spoiler' &&
                    node.classList?.contains('tg-spoiler')) ||
                (type === 'code'       && node.tagName === 'CODE') ||
                (type === 'blockquote' && node.tagName === 'BLOCKQUOTE');
            if (match) {
                const p = node.parentNode;
                while (node.firstChild) p.insertBefore(node.firstChild, node);
                p.removeChild(node);
                onEdit();
                return;
            }
        }
        node = node.parentNode;
    }

    /* Wrap selection */
    const range = sel.getRangeAt(0);
    let wrapper;
    if (type === 'tg-spoiler') {
        wrapper = document.createElement('span');
        wrapper.className = 'tg-spoiler';
    } else {
        wrapper = document.createElement(type);
    }
    try {
        range.surroundContents(wrapper);
    } catch {
        const txt = range.toString();
        if (txt) {
            if (type === 'tg-spoiler')
                document.execCommand('insertHTML', false,
                    `<span class="tg-spoiler">${txt}</span>`);
            else
                document.execCommand('insertHTML', false,
                    `<${type}>${txt}</${type}>`);
        }
    }
    onEdit();
}

function clearFormat() {
    editor.focus();
    const sel = window.getSelection();
    if (sel && !sel.isCollapsed) {
        document.execCommand('removeFormat');
        document.execCommand('insertText', false, sel.toString());
    }
    onEdit();
}

/* ──────────────────────────────────────────────────────────────────
   DATE
────────────────────────────────────────────────────────────────── */
function insertDate() {
    const s = new Date().toLocaleString(undefined, {
        year: 'numeric', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
    });

/* ──────────────────────────────────────────────────────────────────

────────────────────────────────────────────────────────────────── */
function openLinkModal() {

   CLEAR EDITOR
────────────────────────────────────────────────────────────────── */
function clearEditorText() {
