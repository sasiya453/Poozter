<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Web App - Test</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            padding: 20px; 
            /* Telegram එකේ Theme Colors වලට ගැලපෙන්න */
            background: var(--tg-theme-bg-color, #ffffff); 
            color: var(--tg-theme-text-color, #000000); 
        }
        textarea { 
            width: 100%; 
            height: 120px; 
            padding: 10px; 
            margin-bottom: 15px; 
            box-sizing: border-box; 
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background: var(--tg-theme-button-color, #3390ec); 
            color: var(--tg-theme-button-text-color, #ffffff); 
            border: none; 
            border-radius: 5px; 
            font-size: 16px; 
            cursor: pointer; 
        }
        button:disabled {
            background: #a1a1a1;
        }
        #status {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h3>Post එක හදන්න</h3>
    <p style="font-size: 14px;">HTML tags පාවිච්චි කරන්න: &lt;b&gt;Bold&lt;/b&gt;, &lt;i&gt;Italic&lt;/i&gt;, &lt;a href="url"&gt;Link&lt;/a&gt;</p>
    
    <textarea id="postText" placeholder="ඔයාගේ post එක මෙතන ලියන්න..."></textarea>
    
    <button id="sendBtn" onclick="sendPost()">Send to Bot</button>
    
    <p id="status"></p>

    <script>
        // Telegram Web App API එක load කිරීම
        const tg = window.Telegram.WebApp;
        tg.expand(); // App එක Full screen කරන්න

        async function sendPost() {
            const text = document.getElementById("postText").value;
            const status = document.getElementById("status");
            const btn = document.getElementById("sendBtn");

            if (!text) {
                status.innerText = "කරුණාකර Text එකක් ලබා දෙන්න!";
                status.style.color = "red";
                return;
            }

            // Web App එක open කරපු User ගේ ID එක Telegram API එකෙන් කෙලින්ම ගන්නවා
            const userId = tg.initDataUnsafe?.user?.id;

            if (!userId) {
                status.innerText = "User ID එක හොයාගන්න බැහැ. මේක Telegram හරහා Web App එකක් විදියටම Open කරන්න.";
                status.style.color = "red";
                return;
            }

            btn.disabled = true;
            btn.innerText = "Sending Request...";
            status.innerText = "";

            // ⚠️ ඔයාගේ Cloudflare Worker URL එක මෙතනට දෙන්න
            const workerUrl = "https://your-worker-name.workers.dev"; 

            try {
                // Cloudflare Worker එකට POST Request එකක් යැවීම
                const response = await fetch(workerUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        action: "send_preview",
                        text: text,
                        chat_id: userId
                    })
                });

                const result = await response.json();

                if (result.success) {
                    status.innerText = "✅ Post එක Bot හරහා සාර්ථකව යැව්වා!";
                    status.style.color = "green";
                    
                    // ටික වෙලාවකින් Web App එක close කරන්න ඕනේ නම් මේක පාවිච්චි කරන්න පුළුවන්
                    // setTimeout(() => { tg.close(); }, 2000);
                } else {
                    status.innerText = "❌ Error: " + (result.error || "Unknown error");
                    status.style.color = "red";
                }
            } catch (error) {
                status.innerText = "❌ Network Error! Worker URL එක හරිද බලන්න.";
                status.style.color = "red";
            }

            btn.disabled = false;
            btn.innerText = "Send to Bot";
        }
    </script>

</body>
</html>
