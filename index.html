        onEdit();
        editor.focus();
        showToast('✅ Editor cleared');
    });
}

/* ──────────────────────────────────────────────────────────────────
   COPY HTML
────────────────────────────────────────────────────────────────── */
function nodeToTg(node) {
    if (node.nodeType === Node.TEXT_NODE)    return node.textContent;
    if (node.nodeType !== Node.ELEMENT_NODE) return '';

    if (node.nodeName === 'IMG') {
        const id = node.getAttribute('data-tg-id');
        const fb = node.getAttribute('data-tg-fallback') || '🙂';
        return id ? `<tg-emoji emoji-id="${id}">${fb}</tg-emoji>` : fb;
    }
    if (node.nodeName === 'BR') return '\n';

    const inner = [...node.childNodes].map(nodeToTg).join('');

    switch (node.nodeName) {
        case 'B': case 'STRONG':              return `<b>${inner}</b>`;
        case 'I': case 'EM':                  return `<i>${inner}</i>`;
        case 'U':                             return `<u>${inner}</u>`;
        case 'S': case 'STRIKE': case 'DEL':  return `<s>${inner}</s>`;
        case 'A':
            return `<a href="${node.getAttribute('href') || ''}">${inner}</a>`;
        case 'CODE':                          return `<code>${inner}</code>`;
        case 'BLOCKQUOTE':
            return `<blockquote>${inner}</blockquote>`;
        case 'SPAN':
            return node.classList.contains('tg-spoiler')
                ? `<tg-spoiler>${inner}</tg-spoiler>` : inner;
        case 'DIV': case 'P':
            return inner ? `\n${inner}` : '\n';
        default: return inner;
    }
}

function copyHTML() {
    const tmp  = document.createElement('div');
    tmp.innerHTML = editor.innerHTML;
    const raw  = [...tmp.childNodes].map(nodeToTg).join('');
    const html = raw.replace(/^\n+/, '').replace(/\n{3,}/g, '\n\n').trim();
    if (!html) { showToast('⚠️ Editor is empty'); return; }

    const fallback = () => {
        const ta = Object.assign(document.createElement('textarea'),
            { value: html, style: 'position:fixed;opacity:0' });
        document.body.appendChild(ta);
        ta.focus(); ta.select();
        document.execCommand('copy');
        ta.remove();
    };

    (navigator.clipboard?.writeText(html) ?? Promise.reject())
        .catch(fallback)
        .finally(() => {
            const btn  = document.getElementById('copyBtn');
            const orig = btn.innerHTML;
            btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/></svg>
                <span class="btn-label">Copied!</span>`;
            btn.classList.add('success');
            showToast('✅ HTML copied!');
            setTimeout(() => {
                btn.innerHTML = orig;
                btn.classList.remove('success');
            }, 2200);
        });
}

/* ──────────────────────────────────────────────────────────────────
   AUTO-SAVE + CHAR COUNTER
────────────────────────────────────────────────────────────────── */
let _saveTimer;

function charLen() {
    const tmp = document.createElement('div');
    tmp.innerHTML = editor.innerHTML;
    tmp.querySelectorAll('img[data-tg-fallback]').forEach(img =>
        img.replaceWith(img.getAttribute('data-tg-fallback')));
    return (tmp.textContent || '').replace(/\u200B/g, '').length;
}

function updateCounter() {
    const n    = charLen();
    const fill = document.getElementById('charFill');
    const ctr  = document.getElementById('charCounter');
    const MAX  = n <= 1024 ? 1024 : 4096;
    const pct  = Math.min(n / MAX * 100, 100);
    const col  = n > 4096 ? 'var(--danger)'
               : n > 1024 ? 'var(--warning)'
               :             'var(--success)';
    fill.style.width      = pct + '%';
    fill.style.background = col;
    ctr.textContent       = `${n} / ${MAX}`;
    ctr.className = 'char-counter' +
        (n > 4096 ? ' danger' : n > 1024 ? ' warning' : '');
}

function onEdit() {
    updateCounter();
    const st = document.getElementById('saveStatus');
    st.innerHTML = `<svg viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round"
        style="width:12px;height:12px;animation:spin 1s linear infinite">
        <path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Saving…`;
    st.style.color = 'var(--text-3)';
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(() => {
        try { localStorage.setItem('poozter_draft', editor.innerHTML); }
        catch {}
        st.innerHTML = `<svg viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"
            style="width:12px;height:12px">
            <polyline points="20 6 9 17 4 12"/></svg> Saved`;
        st.style.color = 'var(--success)';
    }, 900);
}

/* Load draft on startup */
try {
    const draft = localStorage.getItem('poozter_draft');
    if (draft) editor.innerHTML = draft;
} catch {}
updateCounter();

editor.addEventListener('input', onEdit);

/* Paste → plain text only */
editor.addEventListener('paste', e => {
    e.preventDefault();
    const txt = e.clipboardData.getData('text/plain');
    if (txt) document.execCommand('insertText', false, txt);
});

/* Spoiler reveal on click */
editor.addEventListener('click', e => {
    const sp = e.target.closest('.tg-spoiler');
    if (sp) sp.classList.toggle('revealed');
});

/* Keyboard shortcuts */
editor.addEventListener('keydown', e => {
    const mod = e.ctrlKey || e.metaKey;
    if (!mod) return;
    const k = e.key.toLowerCase();
    if (e.shiftKey) {
        if      (k === 'x') { e.preventDefault(); fmt('strikeThrough'); }
        else if (k === '.') { e.preventDefault(); wrapBlock('blockquote'); }
        else if (k === 'm') { e.preventDefault(); wrapBlock('code'); }
        else if (k === 'p') { e.preventDefault(); wrapBlock('tg-spoiler'); }
        else if (k === 'd') { e.preventDefault(); insertDate(); }
        else if (k === 'n') { e.preventDefault(); clearFormat(); }
    } else {
        if      (k === 'b') { e.preventDefault(); fmt('bold'); }
        else if (k === 'i') { e.preventDefault(); fmt('italic'); }
        else if (k === 'u') { e.preventDefault(); fmt('underline'); }
        else if (k === 'k') { e.preventDefault(); openLinkModal(); }
    }
});

/* ──────────────────────────────────────────────────────────────────
   EMOJI / PACK SYSTEM
────────────────────────────────────────────────────────────────── */
const DEFAULT_PACKS = [
    'NewsEmoji','Udif7rr7_by_fStikBot','OutlineEmoji',
    'FinanceEmoji','FlameEmoji','PremiumIcons'
];

let savedPacks = [];
try {
    const r = localStorage.getItem('tg_saved_packs');
    savedPacks = JSON.parse(r) || [];
    if (!Array.isArray(savedPacks)) savedPacks = [];
} catch { savedPacks = []; }
if (!savedPacks.length) {
    savedPacks = [...DEFAULT_PACKS];
    localStorage.setItem('tg_saved_packs', JSON.stringify(savedPacks));
}

let recentEmojis = [];
try {
    recentEmojis =
        JSON.parse(localStorage.getItem('tg_recent_emojis')) || [];
} catch { recentEmojis = []; }

const loadedPacks = new Map();   // packName → sticker[]
const failedPacks = new Set();

/* ── Tabs ─────────────────────────────────────────────────────── */
function setActiveTab(id) {
    document.querySelectorAll('.pack-tab')
        .forEach(t => t.classList.remove('active'));
    const t = document.getElementById(`tab-${id}`);
    if (t) {
        t.classList.add('active');
        t.scrollIntoView({ inline: 'center', block: 'nearest' });
    }
}

function renderTabs() {
    const c = document.getElementById('pickerTabs');
    c.innerHTML = '';
    c.appendChild(
        _makeTab('recent', '🕒', 'Recently Used', () => showRecentSection()));
    savedPacks.forEach(name => {
        const stickers = loadedPacks.get(name);
        let child;
        if (stickers?.length) {
            const d = getStickerDisplay(stickers[0]);
            if (d) {
                const img    = document.createElement('img');
                img.src      = `/api/image?file_id=${d.file_id}`;
                img.alt      = name.slice(0, 2).toUpperCase();
                img.onerror  = () => img.replaceWith(
                    document.createTextNode(name.slice(0, 2).toUpperCase()));
                child = img;
            }
        }
        c.appendChild(_makeTab(
            name,
            child || name.slice(0, 2).toUpperCase(),
            name,
            () => loadPack(name)));
    });
}

function _makeTab(id, content, title, onclickFn) {
    const t     = document.createElement('div');
    t.className = 'pack-tab';
    t.id        = `tab-${id}`;
    t.title     = title;
    if (typeof content === 'string') t.textContent = content;
    else t.appendChild(content);

    /*
     * Desktop: prevent mousedown from blurring the editor.
     * Mobile:  do NOT prevent mousedown — it interferes with
     *          touch scrolling in the tab bar.
     */
    t.addEventListener('mousedown', e => {
        if (!isMobile()) e.preventDefault();
    });
    t.addEventListener('click', onclickFn);
    return t;
}

/* ── Recent emojis ─────────────────────────────────────────────── */
function addToRecent(data) {
    if (!data.id) return;
    recentEmojis = recentEmojis.filter(e => e.id !== data.id);
    recentEmojis.unshift(data);
    if (recentEmojis.length > 32) recentEmojis.pop();
    try {
        localStorage.setItem('tg_recent_emojis',
            JSON.stringify(recentEmojis));
    } catch {}
    const g = document.getElementById('grid-recent');
    if (g) fillRecentGrid(g);
}

function fillRecentGrid(grid) {
    grid.innerHTML = '';
    if (!recentEmojis.length) {
        const s = document.createElement('span');
        s.style.cssText =
            'color:var(--text-3);font-size:12px;' +
            'grid-column:span 8;padding:8px 0';
        s.textContent = 'No recent emojis yet.';
        grid.appendChild(s);
        return;
    }
    const frag = document.createDocumentFragment();
    recentEmojis.forEach(item => frag.appendChild(makeRecentItem(item)));
    grid.appendChild(frag);
}

function makeRecentItem(data) {
    const wrap     = document.createElement('div');
    wrap.className = 'emoji-grid-item';
    wrap.title     = data.fallback || '';

    const img  = document.createElement('img');
    img.src    = (data.isVideo && data.thumbUrl) ? data.thumbUrl : data.url;
    img.alt    = data.fallback || '';
    img.style.cssText =
        'width:32px;height:32px;object-fit:contain;pointer-events:none';
    img.loading = 'lazy';
    img.onerror = () => {
        wrap.style.fontSize = '22px';
        wrap.textContent    = data.fallback || '?';
    };
    wrap.appendChild(img);

    wrap.addEventListener('mousedown', e => {
        if (!isMobile()) e.preventDefault();
    });
    wrap.addEventListener('click', () => insertEmoji(data));
    return wrap;
}

function showRecentSection() {
    setActiveTab('recent');
    const body = document.getElementById('pickerBody');
    let section = document.getElementById('section-recent');
    if (!section) {
        section = makeSection('recent', 'Recently Used');
        body.prepend(section);
    }
    fillRecentGrid(document.getElementById('grid-recent'));
    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ── Sticker display logic ─────────────────────────────────────── */
function getStickerDisplay(sticker) {
    if (!sticker) return null;
    if (sticker.is_animated) {
        return sticker.thumbnail
            ? { file_id: sticker.thumbnail.file_id,
                isVideo: false, thumbFile_id: null }
            : null;
    }
    if (sticker.is_video) {
        return {
            file_id:      sticker.file_id,
            isVideo:      true,
            thumbFile_id: sticker.thumbnail?.file_id || null
        };
    }
    return { file_id: sticker.file_id, isVideo: false, thumbFile_id: null };
}

/* ── Build one picker grid cell ────────────────────────────────── */
function makeGridItem(sticker) {
    const d = getStickerDisplay(sticker);
    if (!d) return null;

    const wrap     = document.createElement('div');
    wrap.className = 'emoji-grid-item';
    wrap.title     = sticker.emoji || '';

    let media;
    if (d.isVideo) {
        media             = document.createElement('video');
        media.src         = `/api/image?file_id=${d.file_id}`;
        media.autoplay    = true;
        media.loop        = true;
        media.muted       = true;
        media.playsInline = true;
    } else {
        media         = document.createElement('img');
        media.src     = `/api/image?file_id=${d.file_id}`;
        media.alt     = sticker.emoji || '';
        media.loading = 'lazy';
        media.onerror = () => {
            wrap.style.fontSize = '22px';
            wrap.textContent    = sticker.emoji || '?';
        };
    }
    media.style.cssText =
        'width:32px;height:32px;object-fit:contain;pointer-events:none';
    wrap.appendChild(media);

    /*
     * Desktop: mousedown:preventDefault keeps editor focus so the
     *          caret never moves when clicking an emoji.
     * Mobile:  skip preventDefault to avoid interfering with
     *          touch / scroll behaviour.
     */
    wrap.addEventListener('mousedown', e => {
        if (!isMobile()) e.preventDefault();
    });
    wrap.addEventListener('click', () => {
        insertEmoji({
            id:       sticker.custom_emoji_id ||
                      sticker.file_unique_id  || '',
            url:      `/api/image?file_id=${d.file_id}`,
            thumbUrl: (d.isVideo && d.thumbFile_id)
                        ? `/api/image?file_id=${d.thumbFile_id}`
                        : null,
            fallback: sticker.emoji || '🙂',
            isVideo:  d.isVideo
        });
    });
    return wrap;
}

/* ── Section scaffold ──────────────────────────────────────────── */
function makeSection(id, title) {
    const sec     = document.createElement('div');
    sec.className = 'pack-section';
    sec.id        = `section-${id}`;

    const bar     = document.createElement('div');
    bar.className = 'pack-title-bar';

    const left    = document.createElement('div');
    left.className = 'pack-title-left';
    left.innerHTML =
        `<span class="pack-title">${title}</span>
         <span class="pack-title-count" id="count-${id}"></span>`;
    bar.appendChild(left);

    if (id !== 'recent') {
        const acts     = document.createElement('div');
        acts.className = 'pack-actions';
        acts.innerHTML = `
            <button class="view-pack-btn" onclick="viewPack('${id}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round"
                   stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>View
            </button>
            <button class="remove-pack-btn" onclick="removePack('${id}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2.5" stroke-linecap="round"
                   stroke-linejoin="round">
                <line x1="18" y1="6"  x2="6"  y2="18"/>
                <line x1="6"  y1="6"  x2="18" y2="18"/>
              </svg>Remove
            </button>`;
        bar.appendChild(acts);
    }

    const grid     = document.createElement('div');
    grid.className = 'emoji-grid';
    grid.id        = `grid-${id}`;

    sec.appendChild(bar);
    sec.appendChild(grid);
    return sec;
}

/* ── Load Pack from API ────────────────────────────────────────── */
async function loadPack(name) {
    setActiveTab(name);
    const body = document.getElementById('pickerBody');
    document.getElementById('welcomeText').style.display = 'none';

    /* Already loaded — just scroll */
    if (loadedPacks.has(name)) {
        document.getElementById(`section-${name}`)
            ?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        return;
    }
    /* Remove failed section so we can retry */
    if (failedPacks.has(name)) {
        document.getElementById(`section-${name}`)?.remove();
        failedPacks.delete(name);
    }
    /* Already in DOM but still loading */
    if (document.getElementById(`section-${name}`)) {
        document.getElementById(`section-${name}`)
            ?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        return;
    }

    const section = makeSection(name, name);
    body.appendChild(section);
    section.scrollIntoView({ behavior: 'smooth', block: 'start' });

    /* Skeleton placeholders */
    const grid = document.getElementById(`grid-${name}`);
    const sf   = document.createDocumentFragment();
    for (let i = 0; i < 24; i++) {
        const sk     = document.createElement('div');
        sk.className = 'skeleton-item';
        sk.style.animationDelay = `${i * .04}s`;
        sf.appendChild(sk);
    }
    grid.appendChild(sf);

    try {
        const ctrl    = new AbortController();
        const timeout = setTimeout(() => ctrl.abort(), 15000);
        const res     = await fetch(
            `/api/getPack?name=${encodeURIComponent(name)}`,
            { signal: ctrl.signal });
        clearTimeout(timeout);

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        if (!data.ok) {
            showError(grid, name, data.description || 'Telegram error');
            failedPacks.add(name);
            return;
        }

        const stickers = data.result?.stickers || [];
        grid.innerHTML = '';

        const countEl = document.getElementById(`count-${name}`);
        if (countEl) countEl.textContent = stickers.length;

        if (!stickers.length) {
            grid.innerHTML =
                `<span style="color:var(--text-3);font-size:12px;
                 grid-column:span 8">Pack is empty.</span>`;
            return;
        }

        const frag = document.createDocumentFragment();
        stickers.forEach((s, i) => {
            const el = makeGridItem(s);
            if (el) {
                el.style.animationDelay = `${Math.min(i * .02, .5)}s`;
                frag.appendChild(el);
            }
        });
        grid.appendChild(frag);
        loadedPacks.set(name, stickers);
        renderTabs();

    } catch (err) {
        grid.innerHTML = '';
        failedPacks.add(name);
        showError(grid, name,
            err.name === 'AbortError'
                ? 'Request timed out.' : err.message);
    }
}

function showError(grid, name, msg) {
    grid.innerHTML = '';
    const d     = document.createElement('div');
    d.className = 'error-banner';
    d.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8"  x2="12"    y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span>${msg}</span>
        <button class="retry-btn"
                onclick="retryPack('${name}')">Retry</button>`;
    grid.appendChild(d);
}

function retryPack(name) {
    failedPacks.delete(name);
    document.getElementById(`section-${name}`)?.remove();
    loadPack(name);
}

/* ── Pack management ───────────────────────────────────────────── */
function viewPack(name) {
    const url = `https://t.me/addemoji/${name}`;
    if (tgApp?.openTelegramLink) tgApp.openTelegramLink(url);
    else window.open(url, '_blank');
}

function removePack(name) {
    showConfirm('Remove Pack?', `Remove "${name}"?`, '🗑️')
    .then(ok => {
        if (!ok) return;
        savedPacks = savedPacks.filter(p => p !== name);
        localStorage.setItem('tg_saved_packs', JSON.stringify(savedPacks));
        loadedPacks.delete(name);
        failedPacks.delete(name);
        document.getElementById(`section-${name}`)?.remove();
        renderTabs();
        showToast(`✅ "${name}" removed`);
        if (!savedPacks.length && !recentEmojis.length)
            document.getElementById('welcomeText').style.display = 'block';
    });
}

function clearAllData() {
    showConfirm('Clear Everything?',
        'Remove all packs and recent emojis?', '⚠️')
    .then(ok => {
        if (!ok) return;
        savedPacks = []; recentEmojis = [];
        loadedPacks.clear(); failedPacks.clear();
        localStorage.setItem('tg_saved_packs', '[]');
        localStorage.removeItem('tg_recent_emojis');
        renderTabs();
        document.getElementById('pickerBody').innerHTML = `
            <div id="welcomeText" class="status-text">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="1.5" stroke-linecap="round"
                   stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                <line x1="9"  y1="9" x2="9.01"  y2="9"/>
                <line x1="15" y1="9" x2="15.01" y2="9"/>
              </svg>
              No packs added yet.<br>
              Tap <strong>Add Pack</strong> to get started.
            </div>`;
        showToast('🗑️ Cleared');
    });
}

/* ── Add Pack modal ────────────────────────────────────────────── */
function openAddModal() { openModal('addPackModal'); }

function addNewPack() {
    const raw = document.getElementById('packInput').value.trim();
    if (!raw) { showToast('⚠️ Enter a pack name'); return; }

    let name = raw;
    if (raw.includes('t.me') || raw.includes('telegram.me'))
        name = raw.split('/').filter(Boolean).pop();
    name = name.trim();
    if (name.length < 2) { showToast('⚠️ Invalid pack name'); return; }

    if (savedPacks.includes(name)) {
        showToast('ℹ️ Pack already added');
        closeModal('addPackModal');
        document.getElementById(`section-${name}`)
            ?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        setActiveTab(name);
        return;
    }

    document.getElementById('welcomeText').style.display = 'none';
    savedPacks.push(name);
    localStorage.setItem('tg_saved_packs', JSON.stringify(savedPacks));
    renderTabs();
    closeModal('addPackModal');
    loadPack(name);
    showToast(`📦 Loading "${name}"…`);
}

/* ── Pack search ───────────────────────────────────────────────── */
function filterPacks(q) {
    q = q.toLowerCase().trim();
    document.querySelectorAll('.pack-section').forEach(s => {
        if (!q || s.id === 'section-recent') {
            s.style.display = ''; return;
        }
        const n = s.id.replace('section-', '').toLowerCase();
        s.style.display = n.includes(q) ? '' : 'none';
    });
}

/* ──────────────────────────────────────────────────────────────────
   MODAL HELPERS
────────────────────────────────────────────────────────────────── */
function openModal(id) {
    const m = document.getElementById(id);
    m.style.display = 'flex';
    requestAnimationFrame(() => {
        m.classList.add('active');
        requestAnimationFrame(() => m.classList.add('visible'));
    });
    setTimeout(() => m.querySelector('input')?.focus(), 100);
}

function closeModal(id) {
    const m = document.getElementById(id);
    m.classList.remove('visible');
    setTimeout(() => {
        m.classList.remove('active');
        m.style.display = 'none';
        m.querySelectorAll('input').forEach(i => i.value = '');
    }, 260);
}

function handleOverlayClick(e, id) {
    if (e.target === document.getElementById(id)) closeModal(id);
}

async function pasteClip(inputId) {
    try {
        const t = await navigator.clipboard.readText();
        document.getElementById(inputId).value = t;
        document.getElementById(inputId).focus();
    } catch { showToast('⚠️ Paste manually'); }
}

/* Escape closes modals */
document.addEventListener('keydown', e => {
    if (e.key !== 'Escape') return;
    closeModal('addPackModal');
    closeModal('addLinkModal');
    closeConfirm(false);
});

/* ──────────────────────────────────────────────────────────────────
   INIT
────────────────────────────────────────────────────────────────── */
renderTabs();
if (recentEmojis.length)     showRecentSection();
else if (savedPacks.length)  loadPack(savedPacks[0]);
else document.getElementById('welcomeText').style.display = 'block';
</script>
